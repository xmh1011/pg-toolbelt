name: Detect Changes
description: Detect which packages have changed

inputs:
  base:
    description: >-
      Git base ref/sha to diff against. Leave empty on pull_request events so
      dorny/paths-filter auto-detects the PR base. On merge_group events pass
      the merge group base sha so the cumulative queued diff is detected.
    required: false
    default: ""

outputs:
  pg-delta:
    description: Whether pg-delta changed
    value: ${{ steps.filter.outputs.pg-delta }}
  pg-delta-package-json:
    description: Whether pg-delta package.json changed
    value: ${{ steps.filter.outputs.pg-delta-package-json }}
  pg-topo:
    description: Whether pg-topo changed
    value: ${{ steps.filter.outputs.pg-topo }}
  pg-topo-package-json:
    description: Whether pg-topo package.json changed
    value: ${{ steps.filter.outputs.pg-topo-package-json }}
  root:
    description: Whether root config changed
    value: ${{ steps.filter.outputs.root }}
  is-release-pr-content:
    description: >-
      'true' if every changed file is part of the changesets release-PR
      whitelist (CHANGELOGs, package.json version bumps, .changeset state).
      Used to skip heavy tests on release PRs while still running them if
      anything unexpected slipped in.
    value: ${{ steps.release-pr-content.outputs.is-release-pr-content }}

runs:
  using: "composite"
  steps:
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        base: ${{ inputs.base }}
        filters: |
          pg-delta:
            - 'packages/pg-delta/**'
          pg-delta-package-json:
            - 'packages/pg-delta/package.json'
          pg-topo:
            - 'packages/pg-topo/**'
          pg-topo-package-json:
            - 'packages/pg-topo/package.json'
          root:
            - 'package.json'
            - 'bunfig.toml'
            - '.oxlintrc.json'
            - '.oxfmtrc.json'
            - '.changeset/**'

    # Detect any file outside the release-PR whitelist. Uses
    # predicate-quantifier: every so a file matches only when it satisfies
    # ALL listed patterns (including the negated ones). The filter therefore
    # fires on any file that is NOT one of the release-PR artifacts.
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: non-release-files
      with:
        base: ${{ inputs.base }}
        predicate-quantifier: "every"
        filters: |
          non-release-files:
            - "**"
            - "!.changeset/pre.json"
            - "!.changeset/*.md"
            - "!packages/pg-delta/package.json"
            - "!packages/pg-delta/CHANGELOG.md"
            - "!packages/pg-topo/package.json"
            - "!packages/pg-topo/CHANGELOG.md"

    - id: release-pr-content
      shell: bash
      run: |
        if [ "${{ steps.non-release-files.outputs.non-release-files }}" = "false" ]; then
          echo "is-release-pr-content=true" >> "$GITHUB_OUTPUT"
        else
          echo "is-release-pr-content=false" >> "$GITHUB_OUTPUT"
        fi
